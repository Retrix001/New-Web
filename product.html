<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sculpt Seamless Leggings | ATHORA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-page-container {
            display: grid;
            grid-template-columns: 80px 1.2fr 1fr;
            gap: 2rem;
            margin-top: 150px;
            padding: 0 5%;
        }
        .thumbnails {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .thumbnail {
            width: 80px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .thumbnail.active { border-color: var(--color-black); }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }

        .main-image {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: var(--color-gray-100);
        }
        .main-image img { width: 100%; height: auto; }

        .product-sidebar {
            padding: 2rem;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--color-gray-200);
        }

        .urgency-bar {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #fffafa;
            border: 1px solid #ffebeb;
            border-radius: 10px;
        }
        .progress-container {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 0.5rem;
        }
        .progress-bar {
            height: 100%;
            background: #ff4d4d;
            width: 65%;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Header (Same as index) -->
    <header class="header scrolled">
        <div class="container flex justify-between align-center">
            <div class="nav-links flex" style="gap: 2rem;">
                <a href="index.html" class="nav-link">Home</a>
                <a href="collection.html" class="nav-link">Shop</a>
                <a href="#" class="nav-link">Collections</a>
            </div>
            <a href="index.html" class="nav-logo" style="color: black;">ATHORA</a>
            <div class="nav-actions flex align-center" style="gap: 1.5rem;">
                <a href="#" class="nav-link" style="color: black;">🔍</a>
                <a href="#" class="nav-link" style="color: black;">🛒</a>
            </div>
        </div>
    </header>

    <main class="product-page-container">
        <!-- Left: Thumbnails -->
        <div class="thumbnails">
            <div class="thumbnail active"><img src="assets/product-1.png"></div>
            <div class="thumbnail"><img src="assets/category-1.png"></div>
            <div class="thumbnail"><img src="assets/product-1.png"></div>
            <div class="thumbnail"><img src="assets/category-1.png"></div>
        </div>

        <!-- Center: Main Image -->
        <div class="main-image">
            <img src="assets/product-1.png" alt="Product">
        </div>

        <!-- Right: Sidebar -->
        <div class="product-sidebar">
            <h1 style="font-size: 2.5rem; text-transform: none;">Sculpt Seamless Leggings</h1>
            <p style="font-size: 1.5rem; font-weight: 600; margin: 1rem 0;">$85.00</p>
            
            <div style="margin-top: 2rem;">
                <button class="btn-pill" style="width: 100%; justify-content: center; background: #ddd; color: black;">Add to cart</button>
                <button class="btn-pill" style="width: 100%; justify-content: center; margin-top: 1rem; border: 1px solid black; background: white;">Buy it now</button>
            </div>

            <!-- Urgency Bar (Frame 500) -->
            <div class="urgency-bar">
                <p style="font-size: 0.8rem; color: #ff4d4d; font-weight: 600;">Hurry, only 9 items left in stock!</p>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
            </div>

            <div style="margin-top: 2rem; font-size: 0.85rem; color: #666;">
                <p>✓ Pickup available at Athora New York Store</p>
                <p style="margin-top: 0.5rem; opacity: 0.7;">Usually ready in 24 hours</p>
                <a href="#" style="text-decoration: underline; display: block; margin-top: 0.5rem;">View store information</a>
            </div>
        </div>
    </main>

    <section class="section-padding container">
        <h2 style="font-size: 3rem; text-transform: none; text-align: center;">Find your perfect</h2>
    </section>

</body>
</html>
